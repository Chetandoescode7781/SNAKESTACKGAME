<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE GAME</title>
</head>
<body>
    <h1 style="text-align: center;color: greenyellow;text-shadow: 3px 3px 5px black;
    ">SNAKE GAME &#128013</h1>
    <h3>Rules:</h3>
    <ul>
        <li>Use arrow keys or WASD to control the snake</li>
        <li>Press 'P' to Play &nbsp; Press 'Spacebar' to Pause &nbsp; Press 'R' to Restart</li>
        <li> Eat the food to grow longer</li>
        <li> Avoid hitting the walls or yourself</li>
    </ul>
<div  style="border:3px solid brown; float: left; height: 500px">
