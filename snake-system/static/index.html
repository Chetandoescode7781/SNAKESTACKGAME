<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE GAME</title>
</head>
<body style="display:flex; justify-content:center; align-items:center; margin:0; height:100vh; background-color: rgb(168, 217, 6);">
    <div id="rule_container" style="background-color: rgb(108, 118, 98); text-align: center; padding: 20px; border: 10px solid rgb(96, 46, 0); ">
        <h1 style="text-align: center;color: greenyellow;text-shadow: 3px 3px 5px black;">SNAKE GAME &#128013</h1>
        <h3 style="color: red;">Rules:</h3>
     <ul>
        <li>Use arrow keys or WASD to control the snake</li>
        <li>Press 'P' to Play &nbsp; Press 'Spacebar' to Pause &nbsp; Press 'R' to Restart</li>
        <li> Eat the food to grow longer</li>
        <li> Avoid hitting the walls or yourself</li>
     </ul>

    <button onclick="startGame()" style="background-color: greenyellow; color: black; font-size: 16px; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Start</button>
</div>

<div id="game-container" style="border: 8px solid rgb(96, 46, 0); float: center; display:none;">
<canvas id="canvas"></canvas>
</div>
<script src="index.js"></script>
</body>
</html>
